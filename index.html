<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tably</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="icon" type="image/x-icon" href="./favicons/undertaleSouls.ico">
</head>
<body>
    <div class="weather card">
        <a class="weatherLink" target="_blank" href=""> <p class="city">City: Unknown</p> </a>
        <div class="weatherData">
            <p class="temp">Temp: Unknown</p>
            <p>
                <span class="tempFeelsLike">Feels like: Unknown</span>
                <span class="weather-icon"> <img src=""> </span>
            </p>
        </div>
    </div>

    <div class="content">
        <div class="datetimeButton">
            <div class="datetime">
                <p class="time"></p>
                <hr />
                <p class="date"></p>
            </div>
        </div>
    </div>
    
    <div id="quoteDiv">
        <blockquote class="quoteAuthor card">
            <p class="quote"></p>
            <p class="author"></p>
        </blockquote>
        <!-- <div class="quoteAuthor">
            <p class="quote"></p>
            <hr />
            <p class="author"></p>
        </div> -->
    </div>

    <div class="launch-info card">
        <img src="" class="launch-img">
        <div class="launch-data">
            <p class="launch-name"></p>
            <p class="launch-pad"></p>
            <p class="launch-location"></p>
            <p class="launch-window"></p>
            <p class="launch-organization"></p>
        </div>
    </div>

    <script src="./scripts/weatherIcons.js"></script>
    <script src="./scripts/script.js"></script>
</body>
</html>
